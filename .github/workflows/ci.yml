name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source:
    name: Source Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Validate clean source
        run: bun run validate:source
      - name: Biome check
        run: bun run biome:check
      - name: TypeScript check
        run: bun run typecheck
      - name: Deno template check
        run: bun run deno:check

  full-check:
    name: Full Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run full check
        run: bun run check

  generated-drift:
    name: Generated Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Regenerate committed surfaces
        run: |
          bun run generate:agents
          bun run generate:llms
      - name: Check tracked drift
        shell: bash
        run: |
          git diff --exit-code -- AGENTS.md CLAUDE.md GEMINI.md .github/copilot-instructions.md .cursor/rules/webcpu-easel.mdc .rules .aiassistant .junie .clinerules .roo .augment docs/agent-platforms.md llms.txt llms-full.txt

  templates:
    name: Template Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Check templates
        run: bun run templates:check

  artifacts:
    name: Package Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build package
        run: bun run check
      - name: Create archives
        run: bun run pack:archive
      - name: Validate archive outputs
        run: |
          test -f dist/archives/claude.tar.gz
          test -f dist/archives/codex.tar.gz
          test -f dist/archives/opencode.tar.gz
          test -f dist/archives/copilot.tar.gz
          test -f dist/archives/webcpu-agent-skill-all.tar.gz
          test -f dist/archives/SHA256SUMS.txt
          tar -tzf dist/archives/claude.tar.gz | grep '^claude/.claude-plugin/plugin.json$'
          tar -tzf dist/archives/codex.tar.gz | grep '^codex/plugin/webcpu-agent-skill/.codex-plugin/plugin.json$'
      - uses: actions/upload-artifact@v7
        with:
          name: webcpu-agent-skill-archives
          path: dist/archives/*
          if-no-files-found: error
