name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run full validation
        run: bun run check
      - name: Check templates
        run: bun run templates:check
      - name: Create archives
        run: bun run pack:archive
      - name: Validate release files
        run: |
          test -f dist/archives/claude.tar.gz
          test -f dist/archives/codex.tar.gz
          test -f dist/archives/opencode.tar.gz
          test -f dist/archives/copilot.tar.gz
          test -f dist/archives/webcpu-agent-skill-all.tar.gz
          test -f dist/archives/SHA256SUMS.txt
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/archives/claude.tar.gz
            dist/archives/codex.tar.gz
            dist/archives/opencode.tar.gz
            dist/archives/copilot.tar.gz
            dist/archives/webcpu-agent-skill-all.tar.gz
            dist/archives/SHA256SUMS.txt
